<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <base href="/~jc2046/" />
        <script type="module" src="/src/main.ts"></script>
        <script type="module" src="/src/model-viewer.ts"></script>
        <title>Drip - Models</title>
    </head>
    <body class="bg-base text-primary max-w-400 mx-auto sm:px-4">
        <header
            class="fixed top-0 left-0 right-0 z-100 h-16 px-2 sm:px-4 pt-4 mx-auto max-w-400 flex flex-col gap-2 bg-base"
        >
            <nav class="flex items-baseline justify-between px-4 gap-6">
                <a href="index.html" id="banner"> Drip. </a>

                <!-- spaces out banner from rest of the navigation links -->
                <div class="grow"></div>

                <a href="index.html" class="link"> Home </a>
                <a href="model-viewer.html" class="link active"> Models </a>
                <a href="about.html" class="link"> About </a>
            </nav>
            <div class="h-0 border-2 border-t-primary border-b-accent"></div>
        </header>

        <!-- spacer for the header, pushing main down -->
        <div class="h-16 opacity-0"></div>

        <main class="flex flex-col gap-6 sm:gap-8 px-4 sm:px-6 py-6 sm:py-8 mb-8">
            <div id="model-info-header" class="p-4 bg-base border-2 border-primary shadow-lg">
                <h2 id="model-info-title" class="font-display text-4xl font-bold text-center">
                    Loading...
                </h2>
            </div>

            <section
                class="relative flex overflow-hidden shadow-accent-lg border-2 border-primary mx-2 sm:mx-4"
            >
                <canvas id="model-viewer-canvas" class="w-full h-[80vh] min-h-80 block"></canvas>

                <!-- model selector -->
                <div class="absolute top-2 left-2 z-10 group">
                    <select
                        id="model-select"
                        class="btn-neutral appearance-none pr-8 cursor-pointer w-36"
                    >
                        <!-- options are injected via js -->
                    </select>
                    <div
                        class="absolute right-2 top-1/2 -translate-y-1/2 pointer-events-none text-primary group-hover:text-base transition-colors"
                    >
                        <svg
                            xmlns="http://www.w3.org/2000/svg"
                            viewBox="0 0 24 24"
                            fill="none"
                            stroke="currentColor"
                            stroke-width="2"
                            stroke-linecap="round"
                            stroke-linejoin="round"
                            class="lucide lucide-chevron-down-icon lucide-chevron-down h-4 w-4"
                        >
                            <path d="m6 9 6 6 6-6" />
                        </svg>
                    </div>
                </div>

                <div class="absolute bottom-2 left-2 z-10">
                    <button id="btn-toggle-animation" class="btn-primary w-full" disabled>
                        Loading...
                    </button>
                    <template id="btn-disassemble-template">
                        <svg
                            xmlns="http://www.w3.org/2000/svg"
                            viewBox="0 0 24 24"
                            fill="none"
                            stroke="currentColor"
                            stroke-width="2"
                            stroke-linecap="round"
                            stroke-linejoin="round"
                            class="lucide lucide-hammer-icon lucide-hammer w-4 h-4"
                        >
                            <path d="m15 12-9.373 9.373a1 1 0 0 1-3.001-3L12 9" />
                            <path d="m18 15 4-4" />
                            <path
                                d="m21.5 11.5-1.914-1.914A2 2 0 0 1 19 8.172v-.344a2 2 0 0 0-.586-1.414l-1.657-1.657A6 6 0 0 0 12.516 3H9l1.243 1.243A6 6 0 0 1 12 8.485V10l2 2h1.172a2 2 0 0 1 1.414.586L18.5 14.5"
                            />
                        </svg>
                        <span>Disassemble</span>
                    </template>

                    <template id="btn-assemble-template">
                        <svg
                            xmlns="http://www.w3.org/2000/svg"
                            viewBox="0 0 24 24"
                            fill="none"
                            stroke="currentColor"
                            stroke-width="2"
                            stroke-linecap="round"
                            stroke-linejoin="round"
                            class="lucide lucide-undo2-icon lucide-undo-2 w-4 h-4"
                        >
                            <path d="M9 14 4 9l5-5" />
                            <path d="M4 9h10.5a5.5 5.5 0 0 1 5.5 5.5a5.5 5.5 0 0 1-5.5 5.5H11" />
                        </svg>
                        <span>Re-assemble</span>
                    </template>
                </div>

                <!-- controls menu toggle -->
                <button
                    id="btn-controls-toggle"
                    class="absolute top-2 right-2 btn-neutral btn-square z-10"
                >
                    <svg
                        xmlns="http://www.w3.org/2000/svg"
                        viewBox="0 0 24 24"
                        fill="none"
                        stroke="currentColor"
                        stroke-width="2"
                        stroke-linecap="round"
                        stroke-linejoin="round"
                        class="lucide lucide-menu-icon lucide-menu w-5 h-5"
                    >
                        <path d="M4 5h16" />
                        <path d="M4 12h16" />
                        <path d="M4 19h16" />
                    </svg>
                </button>

                <!-- control panel -->
                <div
                    id="controls-panel"
                    class="absolute top-0 -right-72 h-[80vh] min-h-80 w-72 bg-base border-l-2 border-primary transition-transform duration-300 z-20 overflow-y-auto flex flex-col"
                >
                    <!-- header -->
                    <div
                        class="flex items-center justify-between px-4 py-3 border-b-2 border-primary"
                    >
                        <h2 class="font-bold text-lg">Controls</h2>
                        <button id="btn-controls-close" class="btn-neutral btn-square">
                            <svg
                                xmlns="http://www.w3.org/2000/svg"
                                viewBox="0 0 24 24"
                                fill="none"
                                stroke="currentColor"
                                stroke-width="2"
                                stroke-linecap="round"
                                stroke-linejoin="round"
                                class="lucide lucide-x-icon lucide-x w-4 h-4"
                            >
                                <path d="M18 6 6 18M6 6l12 12" />
                            </svg>
                        </button>
                    </div>

                    <!-- controls -->
                    <div class="px-4 py-3 flex flex-col gap-4">
                        <!-- wireframe toggle -->
                        <div class="flex items-baseline justify-between gap-2">
                            <label for="wireframe-toggle">Wireframe</label>
                            <input
                                type="checkbox"
                                id="wireframe-toggle"
                                class="w-5 h-5 accent-accent cursor-pointer"
                            />
                        </div>

                        <!-- environment select -->
                        <div class="flex items-baseline justify-between gap-2">
                            <label for="environment-select">Environment</label>
                            <div class="relative w-32 group">
                                <select
                                    id="environment-select"
                                    id="model-select"
                                    class="btn-neutral w-full appearance-none pr-8 cursor-pointer text-sm"
                                >
                                    <!-- options are injected via js -->
                                </select>
                                <div
                                    class="absolute right-2 top-1/2 -translate-y-1/2 pointer-events-none text-primary group-hover:text-base transition-colors"
                                >
                                    <svg
                                        xmlns="http://www.w3.org/2000/svg"
                                        viewBox="0 0 24 24"
                                        fill="none"
                                        stroke="currentColor"
                                        stroke-width="2"
                                        stroke-linecap="round"
                                        stroke-linejoin="round"
                                        class="lucide lucide-chevron-down-icon lucide-chevron-down w-4 h-4"
                                    >
                                        <path d="m6 9 6 6 6-6" />
                                    </svg>
                                </div>
                            </div>
                        </div>

                        <!-- background blur -->
                        <div class="flex items-center justify-between">
                            <label for="input-bg-blur">Background Blur</label>
                            <input
                                type="range"
                                id="input-bg-blur"
                                min="0"
                                max="1"
                                step="0.1"
                                class="w-32 accent-accent"
                            />
                        </div>

                        <!-- camera fov -->
                        <div class="flex items-center justify-between">
                            <label for="input-camera-fov">Camera FOV</label>
                            <input
                                type="range"
                                id="input-camera-fov"
                                min="30"
                                max="120"
                                step="1"
                                class="w-32 accent-accent"
                            />
                        </div>

                        <!-- directional light intensity -->
                        <div class="flex items-center justify-between">
                            <label for="input-light-intensity">Light intensity</label>
                            <input
                                type="range"
                                id="input-light-intensity"
                                min="0"
                                max="10"
                                step="0.1"
                                class="w-32 accent-accent"
                            />
                        </div>

                        <!-- directional light color -->
                        <div class="flex items-center justify-between">
                            <label for="input-light-color">Light color</label>
                            <input
                                type="color"
                                id="input-light-color"
                                class="w-32 h-5 cursor-pointer"
                            />
                        </div>
                    </div>

                    <hr class="border-primary/20 border-t-2" />

                    <!-- reset button -->
                    <div class="px-4 py-3 mt-auto">
                        <button id="btn-reset-scene" class="btn-neutral w-full">
                            <svg
                                xmlns="http://www.w3.org/2000/svg"
                                viewBox="0 0 24 24"
                                fill="none"
                                stroke="currentColor"
                                stroke-width="2"
                                stroke-linecap="round"
                                stroke-linejoin="round"
                                class="lucide lucide-rotate-ccw-icon lucide-rotate-ccw w-4 h-4"
                            >
                                <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8" />
                                <path d="M3 3v5h5" />
                            </svg>
                            Reset scene
                        </button>
                    </div>
                </div>
            </section>

            <!-- model info panel -->
            <section id="model-info-section">
                <div id="model-info-content">
                    <!-- content injected via js -->
                </div>
            </section>
        </main>
    </body>
</html>
